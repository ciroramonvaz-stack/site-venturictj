<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Venturi — Em manutenção</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #050810 0%, #0a1628 50%, #050810 100%);
      color: #f5f7fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }
    .container {
      max-width: 640px;
      width: 100%;
      text-align: center;
      animation: fadeIn 0.8s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.75rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      margin-bottom: 48px;
      color: #C5A059;
    }
    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 32px;
      display: block;
      animation: spin 8s linear infinite;
      opacity: 0.85;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.25rem;
      font-weight: 600;
      margin: 0 0 16px;
      line-height: 1.2;
      color: #ffffff;
    }
    p.lead {
      font-size: 1.125rem;
      line-height: 1.6;
      color: #c9d4e3;
      margin: 0 0 32px;
    }
    .divider {
      width: 60px;
      height: 2px;
      background: #C5A059;
      margin: 32px auto;
      border: none;
    }
    .contact {
      font-size: 0.95rem;
      color: #a8b5c7;
      line-height: 1.7;
    }
    .contact a {
      color: #C5A059;
      text-decoration: none;
      font-weight: 500;
    }
    .contact a:hover { text-decoration: underline; }
    .footer {
      margin-top: 48px;
      font-size: 0.85rem;
      color: #6b7a90;
      letter-spacing: 0.05em;
    }
    @media (max-width: 480px) {
      h1 { font-size: 1.75rem; }
      p.lead { font-size: 1rem; }
      .logo { font-size: 2rem; margin-bottom: 32px; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="container">
    <div class="logo">VENTURI</div>

    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#C5A059" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
    </svg>

    <h1>Site em manutenção</h1>
    <p class="lead">
      Estamos realizando atualizações para melhorar sua experiência.<br />
      Voltaremos em breve. Agradecemos a compreensão.
    </p>

    <hr class="divider" />

    <div class="contact">
      Para assuntos urgentes, entre em contato:<br />
      <a href="mailto:contato@venturictj.com">contato@venturictj.com</a>
    </div>

    <div class="footer">
      &copy; VENTURI &middot; Inteligência Jurídica & Estratégia Territorial
    </div>
  </main>
</body>
</html>
